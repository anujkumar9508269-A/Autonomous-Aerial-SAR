# coverage_planner/config/mavros_params.yaml
# ===========================================
# MAVROS plugin configuration for ArduPilot SITL.
# This file is optional — MAVROS works without it using defaults.
# Tune these if you see QoS or topic rate issues.

mavros:
  ros__parameters:

    # ── Connection ─────────────────────────────────────────────────────
    fcu_url: "udp://127.0.0.1:14551@14555"
    gcs_url: ""
    target_system_id: 1
    target_component_id: 1

    # ── Plugin whitelist (only load what we need → faster startup) ──────
    plugin_whitelist:
      - sys_status
      - sys_time
      - command
      - setpoint_position
      - local_position
      - global_position
      - imu
      - rc_io
      - safety_area
      - waypoint
      - param

    # ── Local position (ENU, map frame) ────────────────────────────────
    local_position:
      frame_id: "map"
      tf/send: false
      tf/frame_id: "map"
      tf/child_frame_id: "base_link"
      # IMPORTANT: publish at RELIABLE QoS so waypoint_follower's
      # reliable subscriber doesn't drop messages.
      # (MAVROS publishes BEST_EFFORT by default; we override below.)

    # ── Global position ─────────────────────────────────────────────────
    global_position:
      frame_id: "map"
      child_frame_id: "base_link"
      tf/send: false

    # ── System ──────────────────────────────────────────────────────────
    # Heartbeat timeout — how long before MAVROS declares FCU dead
    conn/heartbeat_rate: 1.0
    conn/timeout: 30.0
    conn/timesync_rate: 10.0
    conn/system_time_rate: 1.0

    # ── Setpoint position ────────────────────────────────────────────────
    setpoint_position:
      mav_frame: LOCAL_NED   # ArduPilot expects NED; MAVROS converts ENU→NED
